name: Pipeline API

on: 
  push: 
    branches:
      - release
  pull_request:
    branches:
      - release
      
env:
#  ECS_SERVICE: MY_ECS_SERVICE                 # set this to your Amazon ECS service name
#  ECS_CLUSTER: MY_ECS_CLUSTER                 # set this to your Amazon ECS cluster name
#  AWS_ECS_REPOSITORY                          # set this to the path to your Amazon ECS task definition
#                                              # file, e.g. .aws/task-definition.json
#  CONTAINER_NAME: ""           # set this to the name of the container in the
  AWS_PACKAGE: ${{ secrets.AWS_PACKAGE }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  pipeline:
    name: Pipeline    
    runs-on: ubuntu-latest
    environment:
      name: prd
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Setup .NET CORE
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 3.1.x

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ID }}
        aws-secret-access-key: ${{ secrets.AWS_KEY }}
        aws-region: "${{ secrets.AWS_REGION }}"
        
    #- name: Docker Hub
    #  if: github.event_name != 'pull_request'
    #  uses: docker/login-action@v1
    #  with:
    #    username: ${{ secrets.DOCKER_HUB_USERNAME }}
    #    password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    #- name: Docker Image
    #  run: docker build --build-arg AWS_REGION="${{ secrets.AWS_REGION }}" --build-arg AWS_PACKAGE=${{ secrets.AWS_PACKAGE }} --build-arg AWS_ID=${{ secrets.AWS_ID }} --build-arg AWS_KEY=${{ secrets.AWS_KEY }} -f src/Dockerfile -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:v1 --no-cache .

    #- name: Docker Push
    #  run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:v1

    #- name: Image digest
    #  run: echo ${{ steps.docker_build.outputs.digest }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
      
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }} 
        IMAGE_TAG: v1
      run: |
        docker build --build-arg AWS_REGION=$AWS_REGION  --build-arg AWS_PACKAGE=$AWS_PACKAGE --build-arg AWS_ID=${{ secrets.AWS_ID }} --build-arg AWS_KEY=${{ secrets.AWS_KEY }} -f src//Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG --no-cache .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ secrets.AWS_ECS_REPOSITORY }}.json
        container-name: ${{ secrets.AWS_ECS_CONTAINER }}
        image: ${{ steps.build-image.outputs.image }}

    #- name: Deploy Amazon ECS task definition
    #  uses: aws-actions/amazon-ecs-deploy-task-definition@v1
    #  with:
    #    task-definition: ${{ steps.task-def.outputs.task-definition }}
    #    service: ${{ secrets.AWS_ECS_SERVICE }}
    #    cluster: ${{ secrets.AWS_ECS_CLUSTER }}
    #    wait-for-service-stability: true