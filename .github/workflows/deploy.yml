#name: Pipeline API

on: 
  push: 
    branches:
      - release
  pull_request:
    branches:
      - release
  
env:
#  AWS_REGION: MY_AWS_REGION                   # set this to your preferred AWS region, e.g. us-west-1
#  ECS_SERVICE: MY_ECS_SERVICE                 # set this to your Amazon ECS service name
#  ECS_CLUSTER: MY_ECS_CLUSTER                 # set this to your Amazon ECS cluster name
#  ECS_TASK_DEFINITION: MY_ECS_TASK_DEFINITION # set this to the path to your Amazon ECS task definition
#                                               # file, e.g. .aws/task-definition.json
#  CONTAINER_NAME: MY_CONTAINER_NAME           # set this to the name of the container in the
#                                               # containerDefinitions section of your task definition
  AWS_PACKAGE: ${{ secrets.AWS_PACKAGE }}

jobs:
  pipeline:
    name: Pipeline    
    runs-on: ubuntu-latest
    environment:
      name: prd
    steps:
    - name: Checkout
      uses: actions/checkout@v2
   
    - name: Setup .NET CORE
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 3.1.x
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ID }}
        aws-secret-access-key: ${{ secrets.AWS_KEY }}
        aws-region: "us-east-1"

    - name: Install AWS CLI
      id: install-aws-cli
      uses: unfor19/install-aws-cli-action@master
      with:
        version: 2

    - name: Install CodeArtifact
      run: |
        dotnet tool install -g AWS.CodeArtifact.NuGet.CredentialProvider
        dotnet codeartifact-creds install
        dotnet nuget locals all --clear
        dotnet codeartifact-creds configure set profile user1
        aws configure set region "us-east-1" --profile user1
        aws configure set aws_access_key_id ${{ secrets.AWS_ID }} --profile user1
        aws configure set aws_secret_access_key ${{ secrets.AWS_KEY }} --profile user1

    - name: Restore dependencies
      run: dotnet restore src/JaVisitei.Brasil.Api/*.csproj -s $AWS_PACKAGE
  
    - name: Build
      run: dotnet build --configuration Release --no-restore ./src/JaVisitei.Brasil.Api
      
    - name: Tests
      run: dotnet test --no-restore --verbosity normal ./src/JaVisitei.Brasil.Test
      
    - name: Consume Nuget CodeArtifact
      run: dotnet add src/JaVisitei.Brasil.Api/JaVisitei.Brasil.Api.csproj package JaVisitei.Brasil.Nuget --version 1.0.2 --source $AWS_PACKAGE

    - name: Publish
      run: dotnet publish -c Release -o '${{ github.workspace }}/app/publish'
      
    - uses: microsoft/variable-substitution@v1 
      with:
        files: '${{ github.workspace }}/app/publish/appsettings.json'
      env:
        Connection.Base: ${{ secrets.API_CONNECTION }}
        JWT.JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
        JWT.JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
        JWT.JWT_KEY: ${{ secrets.JWT_KEY }}
        JWT.JWT_SUBJECT: ${{ secrets.JWT_SUBJECT }}
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }} 
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -f src/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

