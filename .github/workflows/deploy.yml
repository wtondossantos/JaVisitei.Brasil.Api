name: Pipeline API

on: 
  push: 
    branches:
      - release
  pull_request:
    branches:
      - release
  
env:
#  AWS_REGION: MY_AWS_REGION                   # set this to your preferred AWS region, e.g. us-west-1
#  ECS_SERVICE: MY_ECS_SERVICE                 # set this to your Amazon ECS service name
#  ECS_CLUSTER: MY_ECS_CLUSTER                 # set this to your Amazon ECS cluster name
#  ECS_TASK_DEFINITION: MY_ECS_TASK_DEFINITION # set this to the path to your Amazon ECS task definition
#                                               # file, e.g. .aws/task-definition.json
#  CONTAINER_NAME: ""           # set this to the name of the container in the
  AWS_PACKAGE: ${{ secrets.AWS_PACKAGE }}

jobs:
  pipeline:
    name: Pipeline    
    runs-on: ubuntu-latest
    environment:
      name: prd
    steps:
    - name: Checkout
      uses: actions/checkout@v2
   
    - name: Setup .NET CORE
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 3.1.x
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ID }}
        aws-secret-access-key: ${{ secrets.AWS_KEY }}
        aws-region: "${{ secrets.AWS_REGION }}"

    - name: Folder
      run: ls
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }} 
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build --build-arg AWS_REGION=$AWS_REGION --build-arg API_CONNECTION="${{ secrets.API_CONNECTION }}" --build-arg JWT_AUDIENCE="${{ secrets.JWT_AUDIENCE }}" --build-arg JWT_ISSUER="${{ secrets.JWT_ISSUER }}" --build-arg JWT_KEY="${{ secrets.JWT_KEY }}" --build-arg JWT_SUBJECT="${{ secrets.JWT_SUBJECT }}" --build-arg AWS_PACKAGE=$AWS_PACKAGE --build-arg AWS_ID=${{ secrets.AWS_ID }} --build-arg AWS_KEY=${{ secrets.AWS_KEY }} -f src//Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG --no-cache .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

