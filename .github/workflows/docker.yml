name: Pipeline Nuget

on: 
  push: 
    branches:
      - release
  pull_request:
    branches:
      - release
  
jobs:
  build:
    name: Build    
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Build the Docker image
      run: docker build . --file ./src/Dockerfile --tag release-container-sample:$(date +%s)